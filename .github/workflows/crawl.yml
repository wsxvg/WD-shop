name: 每小时全量爬取

on:
  push:
    branches: [main]
  schedule:
    # 每小时爬一次（UTC 整点，北京时间 +8）
    - cron: '0 * * * *'
  workflow_dispatch:  # 也可以在 GitHub 页面手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 全量爬取约 5-8 分钟，30 分钟绰绰有余

    permissions:
      contents: write  # 需要写权限来提交更新

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 全量爬取商品
        env:
          PYTHONUNBUFFERED: "1"       # 让 print 进度实时刷进 Actions 日志
          PYTHONIOENCODING: "utf-8"
        run: python -u crawl.py || true
        # 不用 token 时自动走「仅刷新已有店铺商品」路径，
        # getItemList 是公开接口，无需登录

      - name: 生成展示页面
        run: python build_page.py

      - name: 提交更新到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/follow_shops.json data/status.json index.html
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "auto: 每日全量爬取 $(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M')"
          git push
